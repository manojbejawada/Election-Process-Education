# SonarQube Project Properties
sonar.projectKey=civicedu
sonar.projectName=CivicEdu
sonar.projectVersion=1.0

# Paths
sonar.sources=app.js,styles.css,index.html
sonar.tests=__tests__
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gates
sonar.qualitygate.wait=true
sonar.coverage.exclusions=**/*.test.js,**/vendor/**
sonar.cpd.exclusions=**/*.test.js
